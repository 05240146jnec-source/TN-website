<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TN ADMIN - Restaurant Menu</title>
    
    <!-- Premium Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-green: #005a2b;
            --dark-green: #065f32;
            --menu-blue: #31a4ff;
            --content-bg: #e5e5e5;
            --border-line: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body, html { height: 100%; overflow: hidden; }
        .wrapper { display: flex; height: 100vh; width: 100%; }

        /* --- SIDEBAR --- */
        .sidebar { width: 320px; background: white; border-right: 1.5px solid var(--border-line); display: flex; flex-direction: column; padding: 40px 0; flex-shrink: 0; }
        .logo-area { padding: 0 40px; margin-bottom: 70px; font-size: 22px; font-weight: 800; text-decoration: none; color: black; }
        .logo-area span { color: var(--primary-green); }
        .nav-links { list-style: none; padding: 0 25px; flex-grow: 1; }
        .nav-item { display: flex; align-items: center; padding: 14px 25px; margin-bottom: 15px; cursor: pointer; border-radius: 50px; font-weight: 700; color: #000; text-decoration: none; transition: 0.3s; }
        .nav-item i { margin-right: 20px; font-size: 25px; width: 30px; text-align: center; }
        .nav-item.active { background-color: var(--primary-green); color: white !important; }

        /* --- MAIN CONTAINER --- */
        .main-container { flex: 1; display: flex; flex-direction: column; height: 100%; }
        .top-bar { height: 100px; display: flex; justify-content: center; align-items: center; padding: 0 60px; background-color: #f8f9fa; border-bottom: 1.5px solid var(--border-line); position: relative; }
        .top-bar h1 { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; margin: 0; }
        .admin-profile { position: absolute; right: 40px; display: flex; align-items: center; gap: 12px; background: white; padding: 8px 18px 8px 8px; border-radius: 50px; border: 1px solid var(--border-line); cursor: pointer; }
        .avatar { width: 32px; height: 32px; background-color: var(--primary-green); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* --- CONTENT AREA --- */
        .content-area { padding: 40px 60px; flex-grow: 1; overflow-y: auto; background-color: var(--content-bg); }

        /* VIEW SECTIONS */
        .view-section { display: none; background: white; border-radius: 30px; padding: 50px; max-width: 900px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; }
        #tableView { display: block; background: transparent; padding: 0; max-width: none; box-shadow: none; }

        /* Cross Button Style */
        .close-x { position: absolute; top: 25px; right: 30px; font-size: 28px; color: #333; cursor: pointer; transition: 0.2s; }
        .close-x:hover { color: #ff0000; transform: scale(1.1); }

        /* TABLE UI */
        .menu-header-bar { background: white; padding: 30px; border-radius: 15px; border: 2.5px solid var(--menu-blue); display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .search-box { position: relative; width: 65%; }
        .search-box i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); font-size: 22px; color: #333; }
        .search-box input { width: 100%; padding: 15px 15px 15px 55px; border: 1px solid #ccc; border-radius: 12px; font-size: 18px; outline: none; }
        .add-items-btn { background-color: var(--dark-green); color: white; border: none; padding: 12px 28px; border-radius: 12px; font-size: 20px; font-weight: 600; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .add-items-btn .plus-circle { border: 2.2px solid white; border-radius: 50%; width: 25px; height: 25px; display: flex; align-items: center; justify-content: center; font-size: 14px; }

        .menu-tabs { background: #f1f1f1; display: flex; width: 100%; padding: 6px; border-radius: 14px; margin-bottom: 25px; }
        .m-tab { flex: 1; padding: 12px 0; border: none; background: transparent; font-size: 18px; font-weight: 700; cursor: pointer; border-radius: 12px; text-align: center; }
        .m-tab.active { background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .table-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .menu-table { width: 100%; border-collapse: collapse; }
        .menu-table th { padding: 22px 30px; background: white; color: #333; font-weight: 700; font-size: 17px; border-bottom: 1px solid #eee; text-align: left; }
        .menu-table td { padding: 22px 30px; border-bottom: 1px solid #f9f9f9; font-size: 17px; vertical-align: middle; }
        .item-font { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: #000; }
        .action-btns { display: flex; gap: 20px; justify-content: flex-end; }
        .action-btns i { font-size: 26px; color: #444; cursor: pointer; }

        /* FORMS */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .form-title { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 28px; margin-bottom: 5px; }
        .form-subtitle { font-size: 16px; color: #666; margin-bottom: 40px; }
        .form-label { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 18px; margin-bottom: 10px; display: block; }
        .input-custom { background: #f1f3f5; border: 1px solid #e0e0e0; border-radius: 12px; padding: 15px; width: 100%; outline: none; font-size: 16px; }
        .upload-box { background: #f1f3f5; border-radius: 12px; height: 100px; width: 180px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; }
        #imgPrevAdd, #imgPrevEdit { position: absolute; width: 100%; height: 100%; object-fit: cover; display: none; }
        .cat-group { display: flex; gap: 10px; }
        .btn-plus { background: var(--dark-green); color: white; border: none; border-radius: 10px; width: 50px; font-weight: bold; font-size: 22px; cursor: pointer; }
        .footer-btns { display: flex; justify-content: flex-end; gap: 20px; margin-top: 50px; }
        .btn-cancel { background: #e0e0e0; color: #000; border: none; padding: 12px 40px; border-radius: 15px; font-weight: 700; font-size: 18px; cursor: pointer; }
        .btn-action { background: #e0e0e0; color: #000; border: none; padding: 12px 40px; border-radius: 15px; font-weight: 700; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

<div class="wrapper">
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <a href="dashboard.html" class="logo-area"><span>TN</span> ADMIN</a>
        <ul class="nav-links">
            <li><a href="dashboard.html" class="nav-item"><i class="fa-solid fa-table-cells-large"></i> Dashboard</a></li>
            <li><a href="booking.html" class="nav-item"><i class="fa-solid fa-calendar-check"></i> Bookings</a></li>
            <li><a href="menu.html" class="nav-item active"><i class="fa-solid fa-utensils"></i> Restaurant Menu</a></li>
            <li><a href="rooms.html" class="nav-item"><i class="fa-solid fa-bed"></i> Rooms</a></li>
            <li><a href="#" class="nav-item"><i class="fa-solid fa-spa"></i> Spa Services</a></li>
            <li><a href="#" class="nav-item"><i class="fa-solid fa-circle-user"></i> User</a></li>
            <li><a href="#" class="nav-item"><i class="fa-solid fa-comments"></i> Feedback</a></li>
        </ul>
    </aside>

    <div class="main-container">
        <header class="top-bar">
            <h1>Restaurant Menu</h1>
            <div class="admin-profile"><div class="avatar">A</div><strong>Admin</strong></div>
        </header>

        <main class="content-area">
            
            <!-- 1. TABLE VIEW -->
            <div id="tableView" class="view-section">
                <div class="menu-header-bar">
                    <div class="search-box">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="searchInput" placeholder="Search menu items" onkeyup="renderTable()">
                    </div>
                    <button class="add-items-btn" onclick="toggleView('addView')">
                        <div class="plus-circle"><i class="fa-solid fa-plus"></i></div> Add Items
                    </button>
                </div>
                <div class="menu-tabs" id="tabContainer"></div>
                <div class="table-card">
                    <table class="menu-table">
                        <thead>
                            <tr>
                                <th width="40%">Item</th>
                                <th style="text-align: center;">Category</th>
                                <th style="text-align: center;">Price</th>
                                <th style="text-align: right;">Action</th>
                            </tr>
                        </thead>
                        <tbody id="menuRows"></tbody>
                    </table>
                </div>
            </div>

            <!-- 2. ADD ITEM VIEW -->
            <div id="addView" class="view-section">
                <i class="fa-solid fa-xmark close-x" onclick="toggleView('tableView')"></i>
                <div class="form-title">Add Item</div>
                <div class="form-grid">
                    <div>
                        <label class="form-label">Item Name</label>
                        <input type="text" id="addName" class="input-custom" style="margin-bottom: 30px;" placeholder="Pork curry">
                        <label class="form-label">Price(Nu)</label>
                        <input type="text" id="addPrice" class="input-custom" placeholder="300">
                    </div>
                    <div>
                        <label class="form-label">Upload Image</label>
                        <div class="upload-box" style="margin-bottom: 30px;" onclick="document.getElementById('fileAdd').click()">
                            <i class="fa-solid fa-upload" id="upIconAdd"></i>
                            <img id="imgPrevAdd" src="">
                            <input type="file" id="fileAdd" hidden onchange="previewImg(this, 'imgPrevAdd', 'upIconAdd')">
                        </div>
                        <label class="form-label">Category</label>
                        <div class="cat-group">
                            <select id="addCat" class="input-custom"></select>
                            <button class="btn-plus" onclick="toggleView('catView')">+</button>
                        </div>
                    </div>
                </div>
                <div class="footer-btns">
                    <button class="btn-cancel" onclick="toggleView('tableView')">Cancel</button>
                    <button class="btn-action" onclick="saveNewItem()">Add Item</button>
                </div>
            </div>

            <!-- 3. EDIT ITEM VIEW -->
            <div id="editView" class="view-section">
                <i class="fa-solid fa-xmark close-x" onclick="toggleView('tableView')"></i>
                <div class="form-title">Edit Menu Item</div>
                <p class="form-subtitle">Update the menu item details below</p>
                <div class="form-grid">
                    <div>
                        <label class="form-label">Item Name</label>
                        <input type="text" id="editName" class="input-custom" style="margin-bottom: 30px;">
                        <label class="form-label">Price(Nu)</label>
                        <input type="text" id="editPrice" class="input-custom">
                    </div>
                    <div>
                        <label class="form-label">Upload Image</label>
                        <div class="upload-box" style="margin-bottom: 30px;" onclick="document.getElementById('fileEdit').click()">
                            <i class="fa-solid fa-upload" id="upIconEdit"></i>
                            <img id="imgPrevEdit" src="">
                            <input type="file" id="fileEdit" hidden onchange="previewImg(this, 'imgPrevEdit', 'upIconEdit')">
                        </div>
                        <label class="form-label">Category</label>
                        <select id="editCat" class="input-custom"></select>
                    </div>
                </div>
                <div class="footer-btns">
                    <button class="btn-cancel" onclick="toggleView('tableView')">Cancel</button>
                    <button class="btn-action" onclick="saveEdit()">Save Changes</button>
                </div>
            </div>

            <!-- 4. ADD CATEGORY VIEW -->
            <div id="catView" class="view-section">
                <i class="fa-solid fa-xmark close-x" onclick="toggleView('addView')"></i>
                <div class="form-title">Add Category</div>
                <div class="mb-4">
                    <label class="form-label">Category Name</label>
                    <input type="text" id="newCatInput" class="input-custom" placeholder="e.g. Desserts" style="max-width: 400px;">
                </div>
                <div class="footer-btns">
                    <button class="btn-cancel" onclick="toggleView('addView')">Cancel</button>
                    <button class="btn-action" onclick="saveCategory()">Add Category</button>
                </div>
            </div>

            <!-- 5. DELETE PROMPT VIEW -->
            <div id="delView" class="view-section" style="text-align: center; max-width: 500px;">
                <p style="font-size: 20px; font-weight: 700; margin-bottom: 35px;">Are you sure you want to delete <span id="delName" style="color:red"></span>?</p>
                <div class="footer-btns" style="justify-content: center;">
                    <button class="btn-cancel" onclick="toggleView('tableView')">No</button>
                    <button class="btn-action" style="background: red; color: white;" onclick="confirmDelete()">Yes</button>
                </div>
            </div>

        </main>
    </div>
</div>

<script>
    let menuData = [
        { name: "Momo", category: "Fast food", price: "Nu.60" },
        { name: "Pork Chili", category: "Main Dishes", price: "Nu.250" },
    ];
    let categories = ["Fast food", "Main Dishes", "Drinks"];
    let currentFilter = 'All';
    let editIdx = null;

    function toggleView(id) {
        document.querySelectorAll('.view-section').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    function renderTable() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const tbody = document.getElementById('menuRows');
        tbody.innerHTML = '';
        const filtered = menuData.filter(i => (currentFilter === 'All' || i.category === currentFilter) && i.name.toLowerCase().includes(query));
        
        filtered.forEach((item) => {
            const idx = menuData.indexOf(item);
            tbody.innerHTML += `<tr>
                <td class="item-font">${item.name}</td>
                <td style="text-align: center;">${item.category}</td>
                <td style="text-align: center;">${item.price}</td>
                <td style="text-align: right;" class="action-btns">
                    <i class="fa-solid fa-pencil" onclick="openEdit(${idx})"></i>
                    <i class="fa-solid fa-trash-can" onclick="openDelete(${idx})"></i>
                </td>
            </tr>`;
        });
        updateUI();
    }

    function updateUI() {
        // Update Tabs
        const tabCont = document.getElementById('tabContainer');
        let html = `<button class="m-tab ${currentFilter==='All'?'active':''}" onclick="setFilter('All')">All (${menuData.length})</button>`;
        categories.forEach(c => {
            const count = menuData.filter(i => i.category === c).length;
            html += `<button class="m-tab ${currentFilter===c?'active':''}" onclick="setFilter('${c}')">${c} (${count})</button>`;
        });
        tabCont.innerHTML = html;

        // Update Dropdowns
        const options = categories.map(c => `<option value="${c}">${c}</option>`).join('');
        document.getElementById('addCat').innerHTML = options;
        document.getElementById('editCat').innerHTML = options;
    }

    function setFilter(c) { currentFilter = c; renderTable(); }

    function saveNewItem() {
        const n = document.getElementById('addName').value;
        const p = document.getElementById('addPrice').value;
        const c = document.getElementById('addCat').value;
        if(n && p && c) {
            menuData.push({ name: n, category: c, price: "Nu." + p.replace("Nu.", "") });
            renderTable(); toggleView('tableView');
            // Clear inputs
            document.getElementById('addName').value = ''; document.getElementById('addPrice').value = '';
            document.getElementById('imgPrevAdd').style.display='none'; document.getElementById('upIconAdd').style.display='block';
        } else {
            alert("Please fill in all details!");
        }
    }

    function openEdit(idx) {
        editIdx = idx;
        const item = menuData[idx];
        document.getElementById('editName').value = item.name;
        document.getElementById('editPrice').value = item.price.replace("Nu.", "");
        document.getElementById('editCat').value = item.category;
        toggleView('editView');
    }

    function saveEdit() {
        menuData[editIdx].name = document.getElementById('editName').value;
        menuData[editIdx].price = "Nu." + document.getElementById('editPrice').value.replace("Nu.", "");
        menuData[editIdx].category = document.getElementById('editCat').value;
        renderTable(); toggleView('tableView');
    }

    function openDelete(idx) {
        editIdx = idx;
        document.getElementById('delName').innerText = menuData[idx].name;
        toggleView('delView');
    }

    function confirmDelete() {
        menuData.splice(editIdx, 1);
        renderTable(); toggleView('tableView');
    }

    function saveCategory() {
        const v = document.getElementById('newCatInput').value;
        if(v && !categories.includes(v)) {
            categories.push(v);
            document.getElementById('newCatInput').value = '';
            updateUI();
            toggleView('addView');
        }
    }

    function previewImg(input, imgId, iconId) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById(iconId).style.display = 'none';
                const p = document.getElementById(imgId);
                p.src = e.target.result; p.style.display = 'block';
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    window.onload = renderTable;
</script>
</body>
</html>
